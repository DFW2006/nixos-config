[colors]
background = #1c1a24
background-alt = #282433
foreground = #d5cfe1
primary = #bd93f9
alert = #72638a

[bar/main]
width = 100%
height = 28pt
radius = 10
background = ${colors.background}
foreground = ${colors.foreground}
padding-left = 1
padding-right = 1
module-margin = 1
font-0 = "JetBrainsMono Nerd Font:style=Regular:size=10;2"
font-1 = "Symbols Nerd Font:style=Regular:size=10;2"

modules-left = xworkspaces
modules-center = date
modules-right = cpu memory powermenu

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

[module/date]
type = internal/date
interval = 1
date = %H:%M │ %A, %d %b
label = %date%
label-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%

[module/powermenu]
type = custom/text
format = " SYSTEM "
format-background = #7aa2f7
format-foreground = #1a1b26
click-left = /home/nyx/nixos-config/dotfiles/polybar/scripts/powermenu.sh
