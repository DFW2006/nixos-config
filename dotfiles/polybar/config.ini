[colors]
background = #1c1a24
background-alt = #282433
foreground = #d5cfe1
primary = #bd93f9
alert = #72638a

[bar/main]
width = 100%
height = 30pt
radius = 10
background = ${colors.background}
foreground = ${colors.foreground}
padding-left = 1
padding-right = 1
module-margin = 1
font-0 = "JetBrainsMono Nerd Font:style=Regular:size=10;2"
font-1 = "Symbols Nerd Font:style=Regular:size=10;2"

modules-left = xworkspaces
modules-center = date
modules-right = cpu memory battery powermenu

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

[module/xworkspaces]
type = internal/xworkspaces
label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

[module/date]
type = internal/date
interval = 1
date = %H:%M │ %A, %d %b
label = %date%
label-foreground = ${colors.foreground}

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage%%

[module/memory]
type = internal/memory
interval = 2
format-prefix = " "
format-prefix-foreground = ${colors.primary}
label = %percentage_used%%

[module/battery]
type = internal/battery
full-at = 99
low-at = 5
battery = BAT0
adapter = AC
poll-interval = 5

format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%

format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

format-full = <label-full>
format-full-prefix = " "
format-full-prefix-foreground = ${colors.primary}
label-full = %percentage%%

ramp-capacity-0 = " "
ramp-capacity-1 = " "
ramp-capacity-2 = " "
ramp-capacity-3 = " "
ramp-capacity-4 = " "
ramp-capacity-foreground = ${colors.primary}

animation-charging-0 = " "
animation-charging-1 = " "
animation-charging-2 = " "
animation-charging-3 = " "
animation-charging-4 = " "
animation-charging-foreground = ${colors.primary}
animation-charging-framerate = 750

[module/powermenu]
type = custom/script
format = "  "
format-background = #7aa2f7
format-foreground = #1a1b26
click-left = /home/nyx/nixos-config/dotfiles/polybar/scripts/powermenu.sh
